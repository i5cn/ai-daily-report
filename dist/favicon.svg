<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#bg-gradient)"/>
  <g fill="#ffffff" filter="url(#glow)">
    <circle cx="50" cy="50" r="6"/>
    <circle cx="50" cy="25" r="4"/>
    <circle cx="72" cy="38" r="4"/>
    <circle cx="72" cy="62" r="4"/>
    <circle cx="50" cy="75" r="4"/>
    <circle cx="28" cy="62" r="4"/>
    <circle cx="28" cy="38" r="4"/>
  </g>
  <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="50" y1="50" x2="50" y2="29"/>
    <line x1="50" y1="50" x2="68" y2="40"/>
    <line x1="50" y1="50" x2="68" y2="60"/>
    <line x1="50" y1="50" x2="50" y2="71"/>
    <line x1="50" y1="50" x2="32" y2="60"/>
    <line x1="50" y1="50" x2="32" y2="40"/>
  </g>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
</svg>
