# AI Daily Report - 每日自动构建部署工作流
# 
# 触发条件:
#   - 每天 08:00 Asia/Shanghai (UTC 00:00) 定时执行
#   - 支持手动触发 (workflow_dispatch)
#   - 支持 push 到 main 分支时触发
#
# 执行流程:
#   1. 检出代码
#   2. 设置 Node.js 环境
#   3. 安装依赖
#   4. 抓取最新新闻数据 (可选)
#   5. 构建 Astro 站点
#   6. 部署到 GitHub Pages

name: Daily Report

on:
  # 定时触发：每天 UTC 00:00 (北京时间 08:00)
  schedule:
    - cron: '0 0 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      fetch_news:
        description: '是否抓取最新新闻'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  
  # Push 到 main 分支时触发
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - 'astro.config.mjs'

# 权限配置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：防止同时运行多个部署
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    name: Build Site
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史记录，用于生成时间戳
      
      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci
          echo "✅ Dependencies installed"
      
      # 4. 恢复数据缓存（加速抓取）
      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache
            data/reports
          key: ${{ runner.os }}-data-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-data-
      
      # 5. 抓取最新新闻数据（定时触发或手动选择时）
      - name: Fetch latest news
        if: github.event.schedule || github.event.inputs.fetch_news == 'true'
        run: |
          echo "📰 Fetching latest news..."
          echo "Current time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Shanghai time: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')"
          
          # TODO: 启用抓取脚本
          # node scripts/fetch-news.js
          
          echo "✅ News fetch completed (placeholder)"
        env:
          # 如需 API Key，在这里配置
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NODE_ENV: production
      
      # 6. 生成报告数据
      - name: Generate reports
        run: |
          echo "📊 Generating reports..."
          mkdir -p data/reports

          if [ -f data/reports/latest.json ]; then
            echo "✅ Using committed report data: data/reports/latest.json"
          else
            echo "⚠️ No existing latest.json found; generating fallback mock report"
            cp data/reports/report-*.json data/reports/latest.json 2>/dev/null || true
          fi

          echo "✅ Reports generated"
      
      # 7. 构建 Astro 站点
      - name: Build Astro site
        run: |
          echo "🔨 Building Astro site..."
          npm run build
          echo "✅ Build completed"
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://i5cn.github.io/ai-daily-report' }}
      
      # 8. 上传构建产物
      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          retention-days: 1

  # 部署任务
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    
    # 部署环境配置
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      # 部署成功通知
      - name: Deployment summary
        run: |
          echo "🚀 Deployment successful!"
          echo "📍 Site URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📅 Deployed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  # 通知任务（可选）
  notify:
    name: Send notification
    needs: deploy
    runs-on: ubuntu-latest
    if: always()  # 无论成功失败都运行
    
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Daily report deployed successfully"
            echo "Status: SUCCESS"
          else
            echo "❌ Deployment failed"
            echo "Status: FAILURE"
            exit 1
          fi
      
      # TODO: 添加更多通知渠道（Slack, Discord, Email 等）
      # - name: Notify Slack
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {"text": "AI Daily Report deployed!"}
